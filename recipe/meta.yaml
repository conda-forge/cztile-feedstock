{% set name = "cztile" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/cztile-{{ version }}.tar.gz
  sha256: 6553826ea6badcad08b949e2f7534235bc14c93aeea0f3c5ca240def6ceffe76

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python >=3.6,<3.10
  run:
    - python >=3.6,<3.10

test:
  imports:
    - cztile
    - cztile.fixed_total_area_strategy
    - cztile.tiling_strategy
  commands:
    - pip list
    - pip check
  requires:
    - pip

about:
  home: https://pypi.org/project/cztile/
  summary: A set of tiling utilities
  description: |
    This project provides simple-to-use tiling functionality for arrays. 
    It is not linked directly to the CZI file format, but can be of 
    use to process such images in an efficient and tile-wise manner, 
    which is especially important when dealing with larger images.
  license: Apache-2.0
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - goanpeca
